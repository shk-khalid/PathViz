<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#0f172a"/>

  <!-- grid -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="16" y1="12" x2="16" y2="52"/>
    <line x1="32" y1="12" x2="32" y2="52"/>
    <line x1="48" y1="12" x2="48" y2="52"/>

    <line x1="12" y1="16" x2="52" y2="16"/>
    <line x1="12" y1="32" x2="52" y2="32"/>
    <line x1="12" y1="48" x2="52" y2="48"/>
  </g>

  <!-- path -->
  <polyline
    points="16,48 16,32 32,32 32,16 48,16"
    fill="none"
    stroke="#38bdf8"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- start node -->
  <circle cx="16" cy="48" r="4" fill="#22c55e"/>

  <!-- end node -->
  <circle cx="48" cy="16" r="4" fill="#ef4444"/>
